<div class="p-6 w-full h-full flex flex-col space-y-4">
    <h2 class="text-4xl font-semibold">
        Gestion des responsables des chambres
    </h2>

    <!-- Search -->
    <div class="flex items-center justify-between">
        <mat-form-field
            class="w-full max-w-120 fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript ml-4 lg:ml-0"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:search'"
                matPrefix
            ></mat-icon>
            <input
                matInput
                [autocomplete]="'off'"
                [placeholder]="'Recherche'"
                #searchInput
            />
        </mat-form-field>
        <!-- New user -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [color]="'primary'"
            (click)="onOpenModal()"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Nouveau</span>
        </button>
    </div>

    <div class="responsive-table" *ngIf="data$ | async as data">
        <table class="table">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="whitespace-nowrap">Nom</th>
                    <th>Téléphone</th>
                    <th>Résidence</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngIf="data.empty">
                    <td class="text-center" colspan="5">Pas de responsable</td>
                </tr>
                <tr *ngFor="let resp of data.content">
                    <td>{{ resp.id }}</td>
                    <td class="whitespace-nowrap">
                        {{ resp.prenom | titlecase }}
                        {{ resp.nom | uppercase }}
                    </td>
                    <td>{{ resp.telephone }}</td>
                    <td>{{ resp.residence.libelle }}</td>
                    <td class="whitespace-nowrap">
                        <button mat-icon-button (click)="onOpenModal(resp)">
                            <mat-icon
                                class="icon-size-4 text-amber-500"
                                svgIcon="heroicons_solid:pencil-alt"
                            ></mat-icon>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <ng-container *ngIf="data.totalElements > size">
            <paginator
                [pageable]="data"
                (pageEvent)="onPageChange($event)"
            ></paginator>
        </ng-container>
    </div>
</div>
