<div class="kh-page">
    <div class="kh-page-header">
        <h2 class="kh-page-title">{{ 'events.title' | transloco }}</h2>
        <div class="kh-page-actions">
            <button
                class="w-full sm:w-auto text-white"
                mat-flat-button
                [color]="'primary'"
                (click)="addNewEvent()"
            >
                <mat-icon
                    class="icon-size-5 text-white"
                    [svgIcon]="'heroicons_solid:plus-circle'"
                ></mat-icon>
                <span class="kh-button-label">
                    {{ 'common.add' | transloco }}
                </span>
            </button>
        </div>
    </div>

    <!-- Search -->
    <div class="kh-toolbar sm:justify-end">
        <mat-form-field
            class="w-full sm:max-w-120 fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:search'"
                matPrefix
            ></mat-icon>
            <input
                matInput
                [autocomplete]="'off'"
                [placeholder]="'common.search' | transloco"
                #searchInput
            />
        </mat-form-field>
    </div>

    <div class="w-full grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
        <fuse-card
            *ngFor="let event of events$ | async"
            class="flex gap-3 items-center justify-between p-3"
        >
            <mat-icon [svgIcon]="'event'"></mat-icon>
            <div class="flex-1 min-w-0">
                <p class="font-medium truncate">{{ event.libelle }}</p>
                <p *ngIf="event.dateDebut || event.dateFin" class="text-sm text-secondary mt-0.5">
                    {{ event.dateDebut | date:'dd/MM/yyyy' }}
                    <ng-container *ngIf="event.dateFin"> — {{ event.dateFin | date:'dd/MM/yyyy' }}</ng-container>
                </p>
            </div>
            <button
                mat-icon-button
                [matMenuTriggerFor]="menu"
                [attr.aria-label]="'common.actions' | transloco"
            >
                <mat-icon svgIcon="heroicons_solid:dots-vertical"></mat-icon>
            </button>
            <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="addNewEvent(event)">
                    {{ 'common.edit' | transloco }}
                </button>
                <button mat-menu-item>{{ 'common.delete' | transloco }}</button>
            </mat-menu>
        </fuse-card>
    </div>
</div>
