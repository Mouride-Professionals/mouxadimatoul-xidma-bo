<div class="p-6 w-full h-full flex flex-col space-y-4">
    <div class="w-full flex items-center justify-between">
        <h2 class="text-4xl font-semibold">Gestion des événements</h2>
        <!-- New user -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [color]="'primary'"
            (click)="addNewEvent()"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Ajouter</span>
        </button>
    </div>

    <!-- Search -->
    <div class="flex items-center justify-end">
        <mat-form-field
            class="w-full max-w-120 fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript ml-4 lg:ml-0"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:search'"
                matPrefix
            ></mat-icon>
            <input
                matInput
                [autocomplete]="'off'"
                [placeholder]="'Search notes'"
                #searchInput
            />
        </mat-form-field>
    </div>

    <div class="w-full grid grid-cols-3 gap-6">
        <fuse-card
            *ngFor="let event of events$ | async"
            class="col-span-1 flex space-x-3 items-center justify-between p-3"
        >
            <mat-icon [svgIcon]="'event'"></mat-icon>
            <div class="flex-1">
                <span>{{ event.libelle }}</span>
            </div>
            <button mat-button [matMenuTriggerFor]="menu">
                <mat-icon svgIcon="heroicons_solid:dots-vertical"></mat-icon>
            </button>
            <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="addNewEvent(event)">
                    Éditer
                </button>
                <button mat-menu-item>Supprimer</button>
            </mat-menu>
        </fuse-card>
    </div>
</div>
