<h2 mat-dialog-title>Ajouter un événement</h2>
<mat-dialog-content class="mat-typography">
<form [formGroup]="form" class="flex flex-col mt-8 p-8 pb-4 bg-card rounded-2xl shadow overflow-hidden">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <mat-form-field
            [ngClass]="formFieldHelpers"
            class="col-span-1 gt-xs:pr-3">
            <mat-label>Nom de l'événement</mat-label>
            <input matInput name="event" formControlName="event">
            <mat-icon
                class="icon-size-5"
                matSuffix
                [svgIcon]="'event'"></mat-icon>
        </mat-form-field>
    </div>
    <mat-dialog-actions align="">
        <button mat-button mat-dialog-close>Annuler</button>
        <button mat-button [mat-dialog-close]="true" (click)="eventForm()">Enregistrer</button>
    </mat-dialog-actions>
</form>
</mat-dialog-content>
