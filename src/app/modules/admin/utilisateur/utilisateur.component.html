<div class="p-6 w-full h-full flex flex-col space-y-4">
    <div class="w-full flex justify-between items-center">
        <h2 class="text-4xl font-semibold">Gestion des utilisateurs</h2>
        <!-- New user -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [color]="'primary'"
            (click)="openModal()"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Ajouter</span>
        </button>
    </div>

    <!-- Search -->
    <fuse-card class="flex rounded-md items-center px-4 justify-between">
        <div class="flex items-center space-x-2">
            <div
                class="h-full p-4 cursor-pointer text-lg"
                [ngClass]="{ 'border-b-2 border-primary': role === item.value }"
                *ngFor="let item of roleItems"
                (click)="onFilterByRole(item.value)"
            >
                <span>{{ item.name }}</span>
            </div>
        </div>

        <div class="p-2 w-full max-w-120">
            <mat-form-field
                class="w-full fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript ml-4 lg:ml-0"
            >
                <mat-icon
                    class="icon-size-5"
                    [svgIcon]="'heroicons_solid:search'"
                    matPrefix
                ></mat-icon>
                <input
                    matInput
                    [autocomplete]="'off'"
                    [placeholder]="'Recherche'"
                    [(ngModel)]="search"
                    (ngModelChange)="getAllUsers()"
                    #searchInput
                />
            </mat-form-field>
        </div>
    </fuse-card>

    <div class="responsive-table">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Prénom</th>
                    <th>Nom</th>
                    <th>Téléphone</th>
                    <th>Role</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of (data$ | async)?.content">
                    <td>{{ user.id }}</td>
                    <td>{{ user.prenom }}</td>
                    <td>{{ user.nom }}</td>
                    <td>{{ user.telephone }}</td>
                    <td>{{ user.role.libelle }}</td>
                    <td>
                        <mat-slide-toggle
                            (click)="confirmStatut(user.id)"
                            [(ngModel)]="user.statut"
                            color="primary"
                        ></mat-slide-toggle>
                    </td>
                    <td>
                        <button mat-icon-button (click)="openModal(user)">
                            <mat-icon
                                svgIcon="heroicons_solid:pencil-alt"
                            ></mat-icon>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
