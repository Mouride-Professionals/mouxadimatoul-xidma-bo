<h2 mat-dialog-title>{{ titleKey | transloco }}</h2>
<mat-dialog-content>
    <form [formGroup]="form" (ngSubmit)="saveUser()">
        <div class="grid grid-cols-1 gap-4">
            <mat-form-field class="col-span-1 w-full">
                <mat-label for="prenom">{{
                    'fields.firstName' | transloco
                }}</mat-label>
                <input matInput name="prenom" formControlName="prenom" />
                <mat-icon
                    class="icon-size-5"
                    matSuffix
                    [svgIcon]="'heroicons_solid:user-circle'"
                ></mat-icon>
                <mat-error
                    *ngIf="
                        formUser.prenom.touched &&
                        formUser.prenom.errors?.required
                    "
                    class="error-message"
                >
                    {{ 'validation.required.firstName' | transloco }}
                </mat-error>
            </mat-form-field>
            <mat-form-field class="col-span-1 w-full">
                <mat-label for="nom">{{ 'fields.lastName' | transloco }}</mat-label>
                <input matInput name="nom" formControlName="nom" />
                <mat-icon
                    class="icon-size-5"
                    matSuffix
                    [svgIcon]="'heroicons_solid:user-circle'"
                ></mat-icon>
                <mat-error
                    *ngIf="
                        formUser.nom.touched && formUser.nom.errors?.required
                    "
                    class="error-message"
                >
                    {{ 'validation.required.lastName' | transloco }}
                </mat-error>
            </mat-form-field>
            <mat-form-field class="col-span-1 w-full">
                <mat-label for="telephone">{{
                    'fields.phone' | transloco
                }}</mat-label>
                <input
                    matInput
                    maxlength="9"
                    name="telephone"
                    formControlName="telephone"
                />
                <mat-icon
                    class="icon-size-5"
                    matSuffix
                    [svgIcon]="'heroicons_solid:phone'"
                ></mat-icon>
                <mat-error
                    *ngIf="
                        formUser.telephone.touched &&
                        formUser.telephone.errors?.required
                    "
                    class="error-message"
                >
                    {{ 'validation.required.phone' | transloco }}
                </mat-error>
            </mat-form-field>
            <div class="col-span-full flex justify-end items-center gap-4">
                <button
                    mat-flat-button
                    mat-dialog-close
                    type="button"
                    class="bg-red-600 text-white"
                >
                    {{ 'common.cancel' | transloco }}
                </button>
                <button
                    mat-flat-button
                    [disabled]="form.invalid"
                    color="primary"
                >
                    {{ 'common.save' | transloco }}
                </button>
            </div>
        </div>
    </form>
</mat-dialog-content>
