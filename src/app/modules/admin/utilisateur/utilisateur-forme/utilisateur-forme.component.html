<h2 mat-dialog-title>{{ tite }}</h2>
<mat-dialog-content>
    <form [formGroup]="form" (ngSubmit)="saveUser()">
        <div class="grid grid-cols-1 gap-4">
            <mat-form-field class="col-span-1 w-full">
                <mat-label for="prenom">Prénom</mat-label>
                <input matInput name="prenom" formControlName="prenom" />
                <mat-icon
                    class="icon-size-5"
                    matSuffix
                    [svgIcon]="'heroicons_solid:user-circle'"
                ></mat-icon>
                <mat-error
                    *ngIf="
                        formUser.prenom.touched &&
                        formUser.prenom.errors?.required
                    "
                    class="error-message"
                >
                    Le prénom est obligatoire.
                </mat-error>
            </mat-form-field>
            <mat-form-field class="col-span-1 w-full">
                <mat-label for="nom">Nom</mat-label>
                <input matInput name="nom" formControlName="nom" />
                <mat-icon
                    class="icon-size-5"
                    matSuffix
                    [svgIcon]="'heroicons_solid:user-circle'"
                ></mat-icon>
                <mat-error
                    *ngIf="
                        formUser.nom.touched && formUser.nom.errors?.required
                    "
                    class="error-message"
                >
                    Le nom est obligatoire.
                </mat-error>
            </mat-form-field>
            <mat-form-field class="col-span-1 w-full">
                <mat-label for="telephone">Téléphone</mat-label>
                <input
                    matInput
                    maxlength="9"
                    name="telephone"
                    formControlName="telephone"
                />
                <mat-icon
                    class="icon-size-5"
                    matSuffix
                    [svgIcon]="'heroicons_solid:phone'"
                ></mat-icon>
                <mat-error
                    *ngIf="
                        formUser.telephone.touched &&
                        formUser.telephone.errors?.required
                    "
                    class="error-message"
                >
                    Le télephone est obligatoire.
                </mat-error>
            </mat-form-field>
            <div class="col-span-full flex justify-end items-center space-x-4">
                <button
                    mat-flat-button
                    mat-dialog-close
                    type="button"
                    class="bg-red-600 text-white"
                >
                    Annuler
                </button>
                <button
                    mat-flat-button
                    [disabled]="form.invalid"
                    color="primary"
                >
                    Enregistrer
                </button>
            </div>
        </div>
    </form>
</mat-dialog-content>
