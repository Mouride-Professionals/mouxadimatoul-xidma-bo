<div class="w-full relative flex items-center bg-primary">
    <div
        class="w-full md:w-4/6 md:h-full bg-card p-4 md:rounded-r-2xl flex md:items-center justify-center"
    >
        <div class="w-full max-w-80 sm:w-80 mx-auto sm:mx-0">
            <!-- Title -->
            <div
                class="mt-8 text-4xl font-extrabold tracking-tight leading-tight"
            >
                Espace d'administration
            </div>

            <!-- Alert -->
            <fuse-alert
                class="mt-8 -mb-4"
                *ngIf="showAlert"
                [appearance]="'outline'"
                [showIcon]="false"
                [type]="alert.type"
                [@shake]="alert.type === 'error'"
            >
                {{ alert.message }}
            </fuse-alert>

            <!-- Sign in form -->
            <form class="mt-8" [formGroup]="loginForm" #loginNgForm="ngForm">
                <!-- Email field -->
                <mat-form-field class="w-full" appearance="fill">
                    <mat-label>Téléphone</mat-label>
                    <input
                        id="username"
                        matInput
                        [formControlName]="'username'"
                        placeholder="7XXXXXXXX"
                    />
                    <mat-error
                        *ngIf="loginForm.get('username').hasError('required')"
                    >
                        Numéro téléphone obligatoire
                    </mat-error>
                    <mat-error
                        *ngIf="loginForm.get('username').hasError('pattern')"
                    >
                        Numéro de téléphone incorrect
                    </mat-error>
                </mat-form-field>

                <!-- Password field -->
                <mat-form-field class="w-full" appearance="fill">
                    <mat-label>Mot de passe</mat-label>
                    <input
                        id="password"
                        matInput
                        type="password"
                        [formControlName]="'password'"
                        #passwordField
                    />
                    <button
                        mat-icon-button
                        type="button"
                        (click)="
                            passwordField.type === 'password'
                                ? (passwordField.type = 'text')
                                : (passwordField.type = 'password')
                        "
                        matSuffix
                    >
                        <mat-icon
                            class="icon-size-5"
                            *ngIf="passwordField.type === 'password'"
                            [svgIcon]="'heroicons_solid:eye'"
                        ></mat-icon>
                        <mat-icon
                            class="icon-size-5"
                            *ngIf="passwordField.type === 'text'"
                            [svgIcon]="'heroicons_solid:eye-off'"
                        ></mat-icon>
                    </button>
                    <mat-error> Mot de passe obligatoire </mat-error>
                </mat-form-field>

                <!-- Actions -->
                <div class="inline-flex items-end justify-end w-full mt-1.5">
                    <!-- <mat-checkbox
                        [color]="'primary'"
                        [formControlName]="'rememberMe'"
                    >
                        Se souvenir de moi
                    </mat-checkbox> -->
                    <a
                        class="text-md font-medium text-primary-500 hover:underline"
                        [routerLink]="['/mot-de-passe-oublie']"
                        >Mot de passe oublié?
                    </a>
                </div>

                <!-- Submit button -->
                <button
                    class="fuse-mat-button-large w-full mt-6"
                    mat-flat-button
                    [color]="'primary'"
                    [disabled]="loginForm.disabled"
                    type="button"
                    (click)="login()"
                >
                    <span *ngIf="!loginForm.disabled"> Se connecter </span>
                    <mat-progress-spinner
                        *ngIf="loginForm.disabled"
                        [diameter]="24"
                        [mode]="'indeterminate'"
                    ></mat-progress-spinner>
                </button>
            </form>
        </div>
    </div>
    <div class="hidden md:flex w-2/6 h-full items-center justify-center">
        <!-- <span
        class="h-full w-full text-secondary-600"
        style="--transform-scale-x: -1"
        [inlineSVG]="'/assets/icons/svg/player.svg'"
    ></span> -->
    </div>
</div>
