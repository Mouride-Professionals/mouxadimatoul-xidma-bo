<div class="flex flex-col flex-auto p-6 bg-card shadow rounded-2xl overflow-hidden">
    <div class="flex items-start justify-between">
        <div class="text-lg font-medium tracking-tight leading-6 truncate">{{name}}</div>
        <div class="ml-2 -mt-2 -mr-3">
            <button
                mat-icon-button
                [matMenuTriggerFor]="summaryMenu">
                <mat-icon
                    class="icon-size-5"
                    [svgIcon]="'heroicons_solid:dots-vertical'"></mat-icon>
            </button>
            <mat-menu #summaryMenu="matMenu">
                <button mat-menu-item>{{ 'dashboard.actions.createReservation' | transloco }}</button>
                <button mat-menu-item>{{ 'dashboard.actions.roomStatus' | transloco }}</button>
            </mat-menu>
        </div>
    </div>
    <div *ngIf="residences$ | async as residences" class="flex flex-col items-center mt-2">
        <div class="text-7xl sm:text-8xl font-bold tracking-tight leading-none text-red-500">{{residences.length}}</div>
        <div class="text-lg mt-3 font-medium text-red-600 dark:text-blue-500">{{type}}</div>
        <div class="flex flex-row items-baseline justify-between w-full text-black">
            <div class="ml-1.5 text-lg font-semibold">{{nameOne}}
                <p class="text-center">{{numberOne}}</p>
            </div>
            <div class="ml-1.5 text-lg font-semibold">
                <p class="text-center">{{numberTwo}}</p>
            </div>
        </div>
    </div>
</div>
