<div class="flex flex-col flex-auto p-6 bg-card shadow rounded-2xl overflow-hidden">
    <div class="flex items-start">
        <div class="text-lg font-medium tracking-tight leading-6 truncate">{{name}}</div>
    </div>
    <div class="flex items-center mt-4 gap-4">
        <div class="p-3 rounded-full flex items-center justify-center" [ngClass]="iconBgClass">
            <mat-icon class="icon-size-6" [ngClass]="iconColorClass" [svgIcon]="iconName"></mat-icon>
        </div>
        <div class="text-5xl font-bold tracking-tight leading-none">{{count}}</div>
    </div>
</div>
