<div class="p-6 w-full content-container flex flex-col space-y-4">
    <div class="w-full flex justify-between items-center">
        <h2 class="text-4xl font-semibold">Nouvelle réservation</h2>
        <!-- New user -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [routerLink]="['/reservations']"
            [color]="'warn'"
        >
            <mat-icon
                class="icon-size-5"
                svgIcon="mat_solid:arrow_back"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Annuler</span>
        </button>
    </div>

    <fuse-card class="w-full flex-1 h-full overflow-y-scroll p-4">
        <form
            class="w-full"
            [formGroup]="reservationForm"
            (ngSubmit)="onSubmit()"
        >
            <div class="w-full grid grid-cols-2 gap-6">
                <!-- Info réservation -->
                <div class="col-span-2 w-full flex space-x-2 items-center">
                    <h2 class="text-xl font-semibold">
                        Information de la reservation
                    </h2>
                    <div class="flex-1">
                        <mat-divider></mat-divider>
                    </div>
                </div>
                <div class="col-span-1 w-full">
                    <mat-form-field class="w-full" appearance="fill">
                        <mat-label>Période de séjour</mat-label>
                        <mat-date-range-input
                            formGroupName="period"
                            [rangePicker]="picker"
                        >
                            <input
                                matStartDate
                                (dateChange)="
                                    f.period.controls.sortie.reset();
                                    onLoadChambre()
                                "
                                formControlName="entree"
                                placeholder="Date d'entrée"
                            />
                            <input
                                matEndDate
                                (dateChange)="onLoadChambre()"
                                formControlName="sortie"
                                placeholder="Date de sortie"
                            />
                        </mat-date-range-input>
                        <mat-hint>
                            Du
                            {{
                                f.period.controls.entree.value
                                    | date : "dd MMM yyyy"
                            }}
                            Au
                            {{
                                f.period.controls.sortie.value
                                    | date : "dd MMM yyyy"
                            }}
                        </mat-hint>
                        <mat-datepicker-toggle
                            matIconSuffix
                            [for]="picker"
                        ></mat-datepicker-toggle>
                        <mat-date-range-picker #picker></mat-date-range-picker>
                    </mat-form-field>
                </div>
                <div class="col-span-1 w-full">
                    <mat-form-field class="w-full" appearance="fill">
                        <mat-label>Evénement</mat-label>
                        <mat-select formControlName="evenement">
                            <mat-option
                                *ngFor="let e of events$ | async"
                                [value]="e"
                                >{{ e.libelle }}</mat-option
                            >
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-span-1 w-full">
                    <mat-form-field class="w-full" appearance="fill">
                        <mat-label>Résidence</mat-label>
                        <mat-select
                            (ngModelChange)="onLoadChambre()"
                            #residenceSelect
                            formControlName="residence"
                        >
                            <mat-option
                                *ngFor="let r of residences$ | async"
                                [value]="r.id"
                                >{{ r.libelle }}</mat-option
                            >
                        </mat-select>
                    </mat-form-field>
                </div>

                <!-- Info réservation -->
                <div class="col-span-2 w-full flex space-x-2 items-center">
                    <h2 class="text-xl font-semibold">
                        Informations des invités
                    </h2>
                    <div class="flex-1">
                        <mat-divider></mat-divider>
                    </div>
                </div>
                <div class="col-span-1 w-full">
                    <mat-form-field class="w-full" appearance="fill">
                        <mat-label>Délégation</mat-label>
                        <mat-select formControlName="delegation">
                            <mat-option
                                *ngFor="let d of delegations$ | async"
                                [value]="d"
                                >{{ d.nom }}</mat-option
                            >
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="col-span-1 w-full flex items-center">
                    <button
                        mat-raised-button
                        color="primary"
                        class=""
                        (click)="addNewDelegation()"
                    >
                        Nouvelle délégation
                    </button>
                </div>

                    <button
                        mat-raised-button
