<div class="p-6 w-full content-container flex flex-col space-y-4">
    <div class="w-full flex justify-between items-center">
        <h2 class="text-4xl font-semibold">Gestion des réservations</h2>
        <!-- New user -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [routerLink]="['reserver']"
            [color]="'primary'"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Réserver</span>
        </button>
    </div>

    <div class="w-full flex justify-between items-center space-x-4">
        <div class="w-full max-w-72">
            <mat-form-field
                class="w-full fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript"
                appearance="fill"
            >
                <mat-select placeholder="Selectionner une résidence">
                    <mat-option>Résidence A</mat-option>
                    <mat-option>Résidence B</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
        <div class="flex items-center space-x-4">
            <button mat-icon-button>
                <mat-icon svgIcon="mat_solid:arrow_back_ios"></mat-icon>
            </button>
            <span class="text-xl font-semibold">5 Juin - 11 Juin</span>
            <button mat-icon-button>
                <mat-icon svgIcon="mat_solid:arrow_forward_ios"></mat-icon>
            </button>
        </div>
        <mat-button-toggle-group [(ngModel)]="type" aria-label="Font Style">
            <mat-button-toggle value="week">Semaine</mat-button-toggle>
            <mat-button-toggle value="month">Mois</mat-button-toggle>
        </mat-button-toggle-group>
    </div>

    <div class="w-full h-full flex-1 overflow-hidden flex flex-col">
        <div class="w-full bg-white border-b-2 grid grid-cols-8 divide-x-2">
            <div class="w-full p-3">
                <mat-select placeholder="Selectionner un pavillon">
                    <mat-option>Pavillon 1</mat-option>
                    <mat-option>Pavillon 2</mat-option>
                    <mat-option>Pavillon 3</mat-option>
                </mat-select>
                <!-- <mat-form-field class="w-full border-0">
                </mat-form-field> -->
            </div>
            <div
                class="w-full p-3 flex items-center justify-center"
                *ngFor="
                    let w of [
                        'Lundi 5',
                        'Mardi 6',
                        'Mercredi 7',
                        'Jeudi 8',
                        'Vendredi 9',
                        'Samedi 10',
                        'Dimanche 11'
                    ]
                "
            >
                <span>{{ w }}</span>
            </div>
        </div>
        <div
            class="w-full h-full overflow-y-scroll flex-1 flex flex-col divide-y-2"
        >
            <div
                class="w-full bg-white grid grid-cols-8 divide-x-2"
                *ngFor="
                    let c of [
                        1, 3, 2, 5, 123, 24, 8, 198, 245, 25, 42, 171, 202, 254
                    ]
                "
            >
                <div class="col-span-1 w-full p-3 flex flex-col">
                    <span>chambre {{ c }}</span>
                    <span>2 personnes</span>
                </div>
                <div class="w-full col-span-7 p-2 grid grid-cols-7 gap-2">
                    <div
                        class="col-start-3 col-end-7 w-full rounded-full bg-secondary-400"
                    ></div>
                    <div
                        class="col-start-1 col-end-4 w-full rounded-full bg-green-400"
                    ></div>
                </div>
            </div>
        </div>
    </div>
</div>
