<div class="p-6 w-full content-container flex flex-col space-y-4">
    <div class="w-full flex justify-between items-center">
        <h2 class="text-4xl font-semibold">Gestion des réservations</h2>
        <!-- New user -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [routerLink]="['reserver']"
            [color]="'primary'"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Réserver</span>
        </button>
    </div>

    <div class="responsive-table">
        <table class="table">
            <thead>
                <tr>
                    <th>Invité</th>
                    <th>Chambre</th>
                    <th>Date d'entrée</th>
                    <th>Date de sortie</th>
                    <!-- <th>Actions</th> -->
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let res of (data$ | async)?.content">
                    <td>
                        {{ res.invite.prenom | titlecase }}
                        {{ res.invite.nom | uppercase }}
                    </td>
                    <td>
                        {{ res.chambre.pavillon.libelle }} —
                        {{ res.chambre.numero }}
                    </td>
                    <td>
                        {{ res.dateEntree | date : "dd/MM/yyyy" }}
                    </td>
                    <td>
                        {{ res.dateSortie | date : "dd/MM/yyyy" }}
                    </td>
                    <!-- <td>
                        <button mat-icon-button>
                            <mat-icon
                                svgIcon="heroicons_solid:pencil-alt"
                                class="icon-size-4"
                            ></mat-icon>
                        </button>
                    </td> -->
                </tr>
            </tbody>
        </table>
    </div>
