<div class="p-6 w-full h-full flex flex-col space-y-4">
    <h2 class="text-2xl font-semibold">Gestion des utilisateurs</h2>

    <!-- Search -->
    <div class="flex items-center justify-between">
        <mat-form-field
            class="w-full max-w-120 fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript ml-4 lg:ml-0"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:search'"
                matPrefix
            ></mat-icon>
            <input
                matInput
                [autocomplete]="'off'"
                [placeholder]="'Search notes'"
                #searchInput
            />
        </mat-form-field>
        <!-- New reserve -->
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [color]="'primary'" (click)="openModal()"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Ajouter</span>
        </button>
    </div>

    <div class="responsive-table">
        <table class="table">
            <thead>
                <tr>
                    <th>Client</th>
                    <th>Chambre</th>
                    <th>Téléphone</th>
                    <th>Date début</th>
                    <th>Date fin</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let reserve of (data$ | async)?.content">
                    <td>{{reserve.id}}</td>
                    <td>{{reserve.prenom}}</td>
                    <td>{{reserve.nom}}</td>
                    <td>{{reserve.role.libelle}}</td>
                    <td>
                        <mat-slide-toggle (click)="confirmStatut(reserve.id)" [(ngModel)]="reserve.statut" color="primary"></mat-slide-toggle>
                    </td>
                    <td>
                        <button mat-icon-button (click)="openModal(reserve)">
                            <mat-icon svgIcon="heroicons_solid:pencil-alt"></mat-icon>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
