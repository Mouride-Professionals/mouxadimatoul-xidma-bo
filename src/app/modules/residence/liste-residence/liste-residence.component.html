
<div class="p-6 w-full h-full flex flex-col space-y-4">
    <h2 class="text-2xl font-semibold">Liste des résidences</h2>
    <div class="flex items-center justify-between">
        <mat-form-field
            class="w-full max-w-120 fuse-mat-rounded fuse-mat-dense fuse-mat-no-subscript ml-4 lg:ml-0"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:search'"
                matPrefix
            ></mat-icon>
            <input
                matInput
                [autocomplete]="'off'"
                [placeholder]="'Rechercher votre résidence'"
                #searchInput
            />
        </mat-form-field>
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [color]="'primary'" (click)="addResidence()"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">Nouveau</span>
        </button>
    </div>

            <fuse-card *ngFor="let residence of residences$ | async" class="flex flex-col md:flex-row max-w-80 md:max-w-160 w-full filter-listing">
                <div class="flex-0 w-80 md:w-64">
                    <img
                        class="w-full h-full object-cover"
                        [src]="getImage(residence)"
                        alt="Card cover image">
                </div>
                <div class="flex flex-col flex-auto m-8 mb-4">
                    <div class="text-2xl font-semibold leading-tight">{{residence.libelle}}</div>
                    <div class="flex items-center leading-none mt-2 -ml-1">
                        <div class="flex items-center">
                            <mat-icon
                                class="text-orange-500 icon-size-5"
                                [svgIcon]="'mat_outline:star'"></mat-icon>
                            <mat-icon
                                class="text-orange-500 icon-size-5"
                                [svgIcon]="'mat_outline:star'"></mat-icon>
                            <mat-icon
                                class="text-orange-500 icon-size-5"
                                [svgIcon]="'mat_outline:star'"></mat-icon>
                            <mat-icon
                                class="text-orange-500 icon-size-5"
                                [svgIcon]="'mat_outline:star'"></mat-icon>
                            <mat-icon
                                class="text-orange-500 icon-size-5"
                                [svgIcon]="'mat_outline:star_half'"></mat-icon>
                        </div>
                        <div class="text-secondary ml-2">4.5</div>
                        <div class="text-secondary mx-2">&bull;</div>
                        <div class="text-secondary">98 reviews</div>
                    </div>
                    <div class="mt-6">
                        {{residence.description}}
                    </div>
                    <div class="flex items-center mt-3 -mx-3">
                        <a
                            class="px-3 mr-1"
                            mat-button
                            [color]="'primary'"
                            [routerLink]="['./']">
                            Détail
                        </a>
                    </div>
                </div>
            </fuse-card>
        </div>
    </div>
</div>
