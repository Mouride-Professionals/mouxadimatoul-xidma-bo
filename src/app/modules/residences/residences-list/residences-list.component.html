<div class="p-6 w-full h-full flex flex-col space-y-6">
    <div class="w-full flex justify-between items-center">
        <h2 class="text-4xl font-semibold">
            {{ 'residences.title' | transloco }}
        </h2>
        <button
            class="ml-4 px-1 sm:px-4 min-w-10 text-white"
            mat-flat-button
            [color]="'primary'"
            [routerLink]="['nouveau']"
        >
            <mat-icon
                class="icon-size-5"
                [svgIcon]="'heroicons_solid:plus-circle'"
            ></mat-icon>
            <span class="hidden sm:inline-block ml-2">
                {{ 'common.add' | transloco }}
            </span>
        </button>
    </div>

    <div
        class="w-full grid grid-cols-1 md:grid-cols-2 gap-6"
        *ngIf="residences$ | async as residences"
    >
        <fuse-card
            *ngFor="let residence of residences"
            class="col-span-1 flex flex-col h-full md:h-60 overflow-hidden md:flex-row w-full"
        >
            <div class="flex-0 w-full h-60 md:h-full md:w-64">
                <img
                    class="w-full h-full object-cover"
                    [src]="getImage(residence)"
                    [alt]="'residences.imageAlt' | transloco"
                />
            </div>
            <div class="flex flex-col flex-auto m-8 mb-4">
                <div class="text-2xl font-semibold leading-tight">
                    {{ residence.libelle }}
                </div>
                <div class="flex items-center leading-none mt-2 -ml-1">
                    <!-- <div class="text-secondary ml-2">4.5</div>
                    <div class="text-secondary mx-2">&bull;</div> -->
                    <div class="text-secondary">
                        {{
                            'residences.pavilionCount'
                                | transloco
                                    : { count: residence.pavillons.length }
                        }}
                    </div>
                </div>
                <div class="flex-1 mt-6">
                    {{ residence.description | summarize : 100 }}
                </div>
                <div class="flex items-center mt-3 -mx-3">
                    <a
                        class="px-3 mr-1"
                        mat-flat-button
                        [color]="'primary'"
                        [routerLink]="[residence.id]"
                    >
                        {{ 'common.details' | transloco }}
                    </a>
                </div>
            </div>
        </fuse-card>
        <fuse-card
            class="w-full col-span-full p-4 justify-center items-center flex"
            *ngIf="residences.length <= 0"
        >
            <span>{{ 'residences.empty' | transloco }}</span>
        </fuse-card>
    </div>
</div>
