<h2 mat-dialog-title class="text-2xl font-semibold">
    Ajouter un nouveau pavillon
</h2>
<div mat-dialog-content>
    <form [formGroup]="pavillonForm" (ngSubmit)="onSubmit()">
        <div class="w-full flex flex-col space-y-4 py-2">
            <div class="w-full flex space-x-4 items-center">
                <mat-form-field class="w-full" appearance="fill">
                    <mat-label>Nom du pavillon</mat-label>
                    <input matInput type="text" formControlName="libelle" />
                </mat-form-field>
                <mat-form-field class="w-full" appearance="fill">
                    <mat-label>Niveau</mat-label>
                    <input type="number" matInput formControlName="niveau" />
                </mat-form-field>
            </div>
            <ng-container formArrayName="chambres">
                <div
                    *ngFor="let cForm of chambres.controls; let i = index"
                    [formGroup]="cForm"
                    class="w-full flex space-x-4 items-center"
                >
                    <mat-form-field class="w-full" appearance="fill">
                        <input
                            matInput
                            type="text"
                            formControlName="numero"
                            [placeholder]="'Numéro Chambre ' + (i + 1)"
                        />
                    </mat-form-field>
                    <mat-form-field class="w-full" appearance="fill">
                        <input
                            type="number"
                            matInput
                            formControlName="nombrePlace"
                            [placeholder]="
                                'Nombre de places Chambre ' + (i + 1)
                            "
                        />
                    </mat-form-field>
                    <button
                        mat-icon-button
                        color="warn"
                        type="button"
                        (click)="onDeleteChambreItem(i)"
                    >
                        <mat-icon svgIcon="heroicons_solid:trash"></mat-icon>
                    </button>
                </div>
            </ng-container>

            <div class="w-full flex justify-center items-center">
                <button
                    mat-icon-button
                    type="button"
                    color="primary"
                    matTooltip="Ajouter une chambre"
                    matTooltipPosition="above"
                    (click)="onAddChambre()"
                >
                    <mat-icon svgIcon="heroicons_solid:plus"></mat-icon>
                </button>
            </div>

            <div class="w-full flex items-center space-x-4">
                <button mat-raised-button color="primary">Enregistrer</button>
                <button
                    mat-raised-button
                    color="warn"
                    type="button"
                    (click)="onReset()"
                >
                    Annuler
                </button>
            </div>
        </div>
    </form>
</div>
