<!-- Button -->
<button
    mat-icon-button
    [matMenuTriggerFor]="userActions"
    [matTooltip]="'userMenu.open' | transloco"
    [attr.aria-label]="'userMenu.open' | transloco"
>
    <span class="relative">
        <mat-icon [svgIcon]="'heroicons_outline:user-circle'"></mat-icon>
        <span class="user-status-dot w-2 h-2 rounded-full bg-green-500"></span>
    </span>
</button>

<mat-menu [xPosition]="'before'" #userActions="matMenu">
    <button mat-menu-item>
        <span class="flex flex-col leading-none">
            <span>{{ 'userMenu.signedInAs' | transloco }}</span>
            <span class="mt-1.5 text-md font-medium">{{
                user?.role?.libelle
                    ? (('roles.' + user.role.libelle) | transloco | uppercase)
                    : ''
            }}</span>
        </span>
    </button>
    <mat-divider class="my-2"></mat-divider>
    <button mat-menu-item (click)="showProfile()">
        <mat-icon [svgIcon]="'heroicons_outline:user-circle'"></mat-icon>
        <span>{{ 'userMenu.profile' | transloco }}</span>
    </button>
    <mat-divider class="my-2"></mat-divider>
    <button mat-menu-item (click)="signOut()">
        <mat-icon [svgIcon]="'heroicons_outline:logout'"></mat-icon>
        <span>{{ 'userMenu.signOut' | transloco }}</span>
    </button>
</mat-menu>
